# daily_automate configuration
# Copy to ~/.daily-automate/config.yaml and fill in your values.

projects:
  - name: "my-project"
    repos: ["owner/repo-name"]
    slack_channels: ["#my-channel"]
    jira_project: "PROJ"
    knowledge_path: "~/path/to/project"

schedules:
  standup: "0 9 * * 1-5"
  morning_reminder: "0 7 * * 1-5"
  periodic_reminder: "0 */2 * * 1-5"
  pr_poll: "*/5 * * * *"
  pr_review: "0 * * * *"
  jira_poll: "*/30 * * * *"
  slack_digest: "0 8 * * 1-5"
  weekly_summary: "0 16 * * 5"
  metrics: "*/30 * * * *"

slack:
  bot_token: "xoxb-your-token-here"
  default_channel: "#your-channel"
  digest_channels:
    - "#eng-feed"
    - "#ai-news"

jira:
  base_url: "https://your-domain.atlassian.net"
  email: "your-email@company.com"
  api_token: "your-jira-api-token"
  projects:
    - "PROJ"
    - "DISC"
  auto_transition: true
  subtask_templates:
    - summary: "Write tests"
      description: "Add unit tests for the changes"
    - summary: "Update documentation"
      description: "Update relevant docs"

server:
  host: "127.0.0.1"
  port: 8080

tone: "casual"
